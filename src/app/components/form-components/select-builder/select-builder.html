@let ctrl = control();
<label>{{ ctrl?.label ?? 'Select Options' }}</label>

<div class="options">
  @for (option of options.values(); track option) {
    <app-chip (delete)="deleteOption(option)" [title]="option.value">{{
      option.displayValue ?? option.value
    }}</app-chip>
  }
</div>
<button class="add-option" (click)="addOption()" title="Add to options list">
  <app-icon>add</app-icon>
</button>
